name: Monthly Dental Implant Research

on:
  schedule:
    # Runs at 03:00 UTC on the 1st of every month.
    - cron: "0 3 1 * *"
  workflow_dispatch: {}   # lets you trigger it manually to test

permissions:
  contents: write   # needed so the workflow can commit the updated spreadsheet

jobs:
  run-research:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: npm install

      - run: npm start
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_WHATSAPP_FROM: ${{ secrets.TWILIO_WHATSAPP_FROM }}
          WHATSAPP_TO: ${{ secrets.WHATSAPP_TO }}
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Commit updated spreadsheet and dedupe state
        run: |
          git config user.name "dental-research-bot"
          git config user.email "actions@github.com"
          git add data/dental-implant-findings.xlsx data/seen-urls.json
          git diff --cached --quiet || git commit -m "Monthly research update $(date +'%Y-%m-%d')"
          git push
